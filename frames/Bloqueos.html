<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Bloqueados</title>
</head>

<body style="margin:0; font-family:Arial; background:#0D0D0D; color:white;">

<!-- CONTENIDO -->
<div style="padding:25px;">

<h2 style="color:#DBB42C;">Lista de bloqueados</h2>

<table style="width:100%; border-collapse: separate; border-spacing: 8px 8px; margin-top:20px;">

<tr> <!-- Encabezado sin fondo, solo texto dorado -->
<th style="padding:12px; color:var(--dorado);">Nombre</th>
<th style="padding:12px; color:var(--dorado);">Correo</th>
<th style="padding:12px; color:var(--dorado);">ID</th>
<th style="padding:12px; color:var(--dorado);">Acción</th>
</tr>

<tr style="background:#1a1a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.2s;">
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">Carlos Ruiz</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">carlos@email.com</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">#2001</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">
<button style="background:#DBB42C; color:black; border:none; padding:8px 12px; border-radius:6px; font-weight:bold;">
Desbloquear
</button>
</td>
</tr>

<tr style="background:#1a1a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.2s;">
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">Ana Torres</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">ana@email.com</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">#2002</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">
<button style="background:#DBB42C; color:black; border:none; padding:8px 12px; border-radius:6px; font-weight:bold;">
Desbloquear
</button>
</td>
</tr>

</table>
</div>

<script>
  // Efecto hover moderno en filas
  const filas = document.querySelectorAll('table tr:not(:first-child)');
  filas.forEach(fila => {
    fila.addEventListener('mouseenter', () => fila.style.transform = 'scale(1.02)');
    fila.addEventListener('mouseleave', () => fila.style.transform = 'scale(1)');
  });
</script>

</body>
</html>
