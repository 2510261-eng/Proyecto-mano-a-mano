<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Crear Publicación</title>
</head>

<body style="margin:0; font-family:Arial; background:#0d0d0d; color:white;">

<!-- CONTENIDO -->
<div style="padding:30px;">

<h2 style="color:#DBB42C;">Crear Publicación</h2>

<!-- TARJETA -->
<div style="
background:#1a1a1a;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
max-width:700px;
">

<form>

<!-- TITULO -->
<label style="color:#DBB42C;">Título</label><br>
<input type="text" placeholder="Título de la publicación"
style="
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #333;
background:#0d0d0d;
color:white;
">

<!-- DESCRIPCION -->
<label style="color:#DBB42C;">Descripción</label><br>
<textarea placeholder="Escribe el contenido..."
style="
width:100%;
height:120px;
padding:10px;
margin-top:8px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #333;
background:#0d0d0d;
color:white;
resize:none;
"></textarea>

<!-- IMAGEN -->
<label style="color:#DBB42C;">Imagen</label><br>
<input type="file"
style="
margin-top:8px;
margin-bottom:20px;
color:white;
">

<!-- PUBLICACION TEMPORAL -->
<label style="color:#DBB42C;">Publicación temporal</label><br>

<select style="
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:25px;
border-radius:8px;
border:1px solid #333;
background:#0d0d0d;
color:white;
">

<option>No</option>
<option>24 horas</option>
<option>3 días</option>
<option>7 días</option>

</select>

<!-- BOTONES -->
<div style="display:flex; gap:15px;">

<button type="submit"
style="
background:#DBB42C;
color:black;
border:none;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
">
Publicar
</button>

<button type="reset"
style="
background:#333;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
">
Limpiar
</button>

</div>

</form>

</div>

</div>

</body>
</html>
