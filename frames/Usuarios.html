<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>

<body style="margin:0; font-family:Arial; background:#0d0d0d; color:white;">

<!-- CONTENIDO -->
<div style="padding:25px;">

<h2 style="color:#DBB42C;">Lista de usuarios</h2>

<table style="width:100%; border-collapse: separate; border-spacing: 8px 8px; margin-top:20px;">

<tr style="background:#0D0D0D;">
<th style="padding:12px; border-bottom:2px solid var(--dorado);">Nombre</th>
<th style="padding:12px; border-bottom:2px solid var(--dorado);">Correo</th>
<th style="padding:12px; border-bottom:2px solid var(--dorado);">ID</th>
<th style="padding:12px; border-bottom:2px solid var(--dorado);">Acción</th>
</tr>

<tr style="background:#1a1a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.2s;">
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">Juan Pérez</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">juan@email.com</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">#1001</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">
<button style="background:red; color:white; border:none; padding:8px 12px; border-radius:6px;">
Bloquear
</button>
<button style="background:green; color:white; border:none; padding:8px 12px; border-radius:6px;">
Editar
</button>
</td>
</tr>

<tr style="background:#1a1a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.2s;">
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">María López</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">maria@email.com</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">#1002</td>
<td style="padding:12px; border:1px solid var(--dorado); border-radius:6px; background:#333333;">
<button style="background:red; color:white; border:none; padding:8px 12px; border-radius:6px;">
Bloquear
</button>
<button style="background:green; color:white; border:none; padding:8px 12px; border-radius:6px;">
Editar
</button>
</td>
</tr>

</table>
</div>

<script>
  // Efecto hover moderno
  const filas = document.querySelectorAll('table tr:not(:first-child)');
  filas.forEach(fila => {
    fila.addEventListener('mouseenter', () => fila.style.transform = 'scale(1.02)');
    fila.addEventListener('mouseleave', () => fila.style.transform = 'scale(1)');
  });
</script>

</body>
</html>
