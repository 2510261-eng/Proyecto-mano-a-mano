<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Alamoxtitla</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="login-card">

<h2>Iniciar Sesión</h2>

<form onsubmit="return login()">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="usuario" placeholder="Usuario">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Contraseña">
</div>

<button>Ingresar</button>

<p id="mensaje"></p>

</form>

</div>

</div>



<!-- CONTENIDO -->

<div id="contenido">

<div class="encabezado">
<h1>Alamoxtitla</h1>
</div>

<div class="contenedor">

<div class="menu">

<a href="#">Revisar</a>
<a href="#">Revisado</a>
<a href="#">Publicar</a>
<a href="#">Usuario</a>
<a href="#">Bloqueos</a>

<button onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

  <!-- FRAMES -->
<div class="main-content">
    <iframe id="frame-content" src="frames/publicado.html"></iframe>
</div>
  
<div class="main">

<h1>Avisos</h1>

<p>Bienvenido a tu comunidad</p>

<img src="recursos/imagen1.jpg">
<img src="recursos/imagen1.jpg">
<img src="recursos/imagen1.jpg">

</div>

</div>

</div>



<script>

function login(){

let user=document.getElementById("usuario").value;
let pass=document.getElementById("password").value;

if(user==="Desarrollador" && pass==="bloqueo"){

document.getElementById("login").style.display="none";
document.getElementById("contenido").style.display="block";

}else{

document.getElementById("mensaje").innerHTML="Datos incorrectos";
document.getElementById("mensaje").style.color="red";

}

return false;

}


function cerrarSesion(){

document.getElementById("contenido").style.display="none";
document.getElementById("login").style.display="flex";

}

</script>
</body>
</html>
